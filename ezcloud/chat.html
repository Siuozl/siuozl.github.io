<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ezCloud Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 600px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: #e9ecef;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
            padding: 0 8px;
        }

        .chat-input-area {
            padding: 16px;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .status {
            font-size: 12px;
            color: #999;
            padding: 8px 16px;
            text-align: center;
            border-top: 1px solid #f0f0f0;
        }

        .status.connected {
            color: #28a745;
            font-weight: 600;
        }

        .status.disconnected {
            color: #dc3545;
            font-weight: 600;
        }

        .debug-info {
            font-size: 11px;
            color: #666;
            padding: 8px 16px;
            border-top: 1px solid #f0f0f0;
            background: #f9f9f9;
            font-family: monospace;
            word-break: break-all;
            max-height: 100px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <iframe src="https://siuozl.github.io/ezcloud/index.html?namespace=siuozl-github" frameborder="0" style="position: fixed; top: 0; right: 0; width: 400px; height: 400px; border: 2px solid red; z-index: 9999;"></iframe>
    <div class="chat-container">
        <div class="chat-header">ezCloud Chat</div>
        <div class="chat-messages" id="messages"></div>
        <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="Type a message..." />
            <button onclick="sendMessage()">Send</button>
        </div>
        <div class="status" id="status">Initializing...</div>
        <div class="debug-info" id="debugInfo">Cloud: (empty)</div>
    </div>

    <script>
        const NAMESPACE = "siuozl-github";
        const SET_KEY = "setCloud";
        const GET_KEY = "cloud";
        
        // ezcloud localStorage structure: extensions.turbowarp.org/local-storage:namespace
        function getStorageKey(namespace) {
            return `extensions.turbowarp.org/local-storage:${namespace}`;
        }
        
        function getCacheData(namespace) {
            try {
                const stored = localStorage.getItem(getStorageKey(namespace));
                if (!stored) return {};
                const parsed = JSON.parse(stored);
                // `data` may already be an object or a JSON string depending on what wrote it
                let data = parsed.data;
                if (typeof data === 'string') {
                    data = JSON.parse(data);
                }
                return data || {};
            } catch (e) {
                console.error("Error parsing cache data:", e);
                return {};
            }
        }
        
        function setCacheData(namespace, key, value) {
            try {
                const data = getCacheData(namespace);
                // if the external protocol uses "setCloud" as the write key,
                // internally we store it under "cloud" so that reads are simpler
                const dataKey = key === SET_KEY ? "cloud" : key;
                data[dataKey] = value;
                const storageValue = {
                    time: Date.now(),
                    data: data
                };
                localStorage.setItem(getStorageKey(namespace), JSON.stringify(storageValue));
            } catch (e) {
                console.error("Error setting cache data:", e);
            }
        }
        
        let lastMessage = "";
        let userId = "user_" + Math.random().toString(36).substr(2, 9);

        const messagesDiv = document.getElementById("messages");
        const messageInput = document.getElementById("messageInput");
        const statusDiv = document.getElementById("status");
        const debugDiv = document.getElementById("debugInfo");
        const iframe = document.querySelector("iframe");
        
        let cloudValue = null;
        // grab whatever is currently in storage so we don't miss the first message
        const initial = getCacheData(NAMESPACE);
        if (initial.cloud) {
            cloudValue = initial.cloud;
            lastMessage = cloudValue;
        }

        // Listen for storage updates from iframe
        window.addEventListener("message", (event) => {
            if (event.data.type === "storage-update") {
                console.log("Cloud value:", event.data.value);
                cloudValue = event.data.value;
            }
        });

        // Initialize connection
        function initConnection() {
            updateStatus("Connected to ezCloud", true);
            pollMessages();
        }

        function updateStatus(message, connected) {
            statusDiv.textContent = message;
            statusDiv.className = "status " + (connected ? "connected" : "disconnected");
        }

        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const messageObj = {
                userId: userId,
                text: text,
                timestamp: timestamp,
                sender: "sent"
            };

            // Display message locally
            addMessageToChat("sent", text, timestamp);

            // Send to cloud via localStorage
            try {
                const messageString = JSON.stringify(messageObj);
                // write using SET_KEY so iframe gets notified, but internally it will map to `cloud`
                setCacheData(NAMESPACE, SET_KEY, messageString);
                // Also notify iframe to sync to cloud
                iframe.contentWindow.postMessage({
                    type: "storage-update",
                    namespace: NAMESPACE,
                    key: SET_KEY,
                    value: messageString
                }, "*");
            } catch (e) {
                console.error("Error sending message:", e);
            }

            messageInput.value = "";
            messageInput.focus();
        }

        function pollMessages() {
            try {
                // Debug display
                let debug = [];
                debug.push(`Cloud: ${cloudValue || "(empty)"}`);
                debugDiv.textContent = debug.join(" | ");
                
                // prefer the value pushed by the iframe, but also read directly from storage
                if (!cloudValue) {
                    const stored = getCacheData(NAMESPACE);
                    if (stored.cloud) {
                        cloudValue = stored.cloud;
                    }
                }

                if (cloudValue && cloudValue !== lastMessage) {
                    lastMessage = cloudValue;
                    
                    try {
                        const messageObj = JSON.parse(cloudValue);
                        if (messageObj.userId !== userId) {
                            const timestamp = messageObj.timestamp || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                            addMessageToChat("received", messageObj.text, timestamp);
                        }
                    } catch (e) {
                        // If it's not JSON, display as plain text
                        const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        addMessageToChat("received", cloudValue, timestamp);
                    }
                }
            } catch (e) {
                console.error("Error polling messages:", e);
            }

            setTimeout(pollMessages, 500);
        }

        function addMessageToChat(type, text, timestamp) {
            const messageDiv = document.createElement("div");
            messageDiv.className = "message " + type;
            
            const bubble = document.createElement("div");
            bubble.style.display = "flex";
            bubble.style.flexDirection = "column";
            
            const bubbleText = document.createElement("div");
            bubbleText.className = "message-bubble";
            bubbleText.textContent = text;
            
            const timeText = document.createElement("div");
            timeText.className = "message-time";
            timeText.textContent = timestamp;
            
            bubble.appendChild(bubbleText);
            bubble.appendChild(timeText);
            messageDiv.appendChild(bubble);
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Event listeners
        messageInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                sendMessage();
            }
        });

        // Start
        initConnection();
    </script>
</body>
</html>
