<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browsr</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080a0f;
      --surface: #0d1117;
      --accent1: #00f5d4;
      --accent2: #f72585;
      --accent3: #ffd60a;
      --text: #e8eaf0;
      --muted: #4a5568;
      --glow1: rgba(0, 245, 212, 0.35);
      --glow2: rgba(247, 37, 133, 0.35);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      pointer-events: none;
    }

    .mesh {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(0,245,212,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 70%, rgba(247,37,133,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 55% 10%, rgba(255,214,10,0.07) 0%, transparent 60%);
      animation: meshShift 14s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes meshShift {
      0%   { filter: hue-rotate(0deg) brightness(1); }
      50%  { filter: hue-rotate(25deg) brightness(1.08); }
      100% { filter: hue-rotate(-15deg) brightness(0.95); }
    }

    .scanlines {
      position: fixed; inset: 0; z-index: 1;
      background: repeating-linear-gradient(to bottom, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
      pointer-events: none;
    }

    .corner {
      position: fixed; width: 60px; height: 60px; z-index: 2; pointer-events: none;
    }
    .corner::before, .corner::after { content: ''; position: absolute; background: var(--accent1); }
    .corner::before { width: 100%; height: 2px; }
    .corner::after  { width: 2px; height: 100%; }
    .corner--tl { top: 20px; left: 20px; }
    .corner--tr { top: 20px; right: 20px; transform: scaleX(-1); }
    .corner--bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
    .corner--br { bottom: 20px; right: 20px; transform: scale(-1); }

    .ticker-wrap {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
      height: 32px; border-top: 1px solid rgba(0,245,212,0.2);
      background: rgba(0,245,212,0.04); overflow: hidden;
      display: flex; align-items: center;
    }
    .ticker-track {
      display: flex; gap: 80px; white-space: nowrap;
      animation: ticker 36s linear infinite;
    }
    .ticker-item { font-size: 10px; letter-spacing: 0.15em; color: var(--accent1); opacity: 0.5; text-transform: uppercase; }
    @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    /* ── Layout ── */
    .container {
      position: relative; z-index: 5;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 36px;
      padding-bottom: 48px;
    }

    /* ── Logo ── */
    .logo-wrap {
      text-align: center;
      animation: fadeDown 0.9s cubic-bezier(0.16,1,0.3,1) both;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(80px, 15vw, 180px);
      line-height: 0.88; letter-spacing: -0.01em;
      display: inline-block;
    }
    .logo .letter-b  { color: var(--text); }
    .logo .letter-r  { color: var(--accent1); text-shadow: 0 0 40px var(--glow1); }
    .logo .letter-o  { color: transparent; -webkit-text-stroke: 2px var(--accent2); }
    .logo .letter-w  { color: var(--accent3); text-shadow: 0 0 30px rgba(255,214,10,0.5); }
    .logo .letter-s  { color: transparent; -webkit-text-stroke: 2px var(--text); }
    .logo .letter-r2 { color: var(--accent2); text-shadow: 0 0 40px var(--glow2); }

    .tagline { font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase; color: var(--muted); margin-top: 8px; }
    .tagline span { color: var(--accent1); }

    /* ── Engine picker ── */
    .engine-picker {
      display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
      width: min(720px, 92vw);
      animation: fadeUp 0.9s 0.1s cubic-bezier(0.16,1,0.3,1) both;
    }

    .engine-btn {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
      padding: 6px 13px;
      border-radius: 2px;
      border: 1px solid rgba(255,255,255,0.09);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      position: relative;
      transition: color 0.18s, border-color 0.18s, background 0.18s, transform 0.15s, box-shadow 0.18s;
      overflow: hidden;
    }
    .engine-btn::after {
      content: '';
      position: absolute; inset: 0;
      background: var(--engine-color, var(--accent1));
      opacity: 0;
      transition: opacity 0.18s;
    }
    .engine-btn:hover {
      color: var(--text);
      border-color: var(--engine-color, var(--accent1));
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .engine-btn.active {
      color: #080a0f;
      border-color: var(--engine-color, var(--accent1));
      background: var(--engine-color, var(--accent1));
      box-shadow: 0 0 20px color-mix(in srgb, var(--engine-color, var(--accent1)) 60%, transparent);
    }
    .engine-btn:not(.active):hover::after { opacity: 0.06; }

    /* engine dot indicator */
    .engine-dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
      margin-right: 5px;
      vertical-align: middle;
      opacity: 0.6;
    }
    .engine-btn.active .engine-dot { opacity: 1; }

    /* ── Search bar ── */
    .search-wrap {
      width: min(680px, 90vw);
      animation: fadeUp 0.9s 0.2s cubic-bezier(0.16,1,0.3,1) both;
    }

    .search-box {
      position: relative; display: flex; align-items: center;
    }
    .search-box::before {
      content: ''; position: absolute; inset: -2px; border-radius: 4px;
      background: linear-gradient(130deg, var(--active-color, var(--accent1)), var(--accent2), var(--accent3));
      z-index: -1; opacity: 0; transition: opacity 0.3s, background 0.4s;
    }
    .search-box:focus-within::before { opacity: 1; }
    .search-box:focus-within::after {
      content: ''; position: absolute; inset: -2px; border-radius: 4px;
      background: linear-gradient(130deg, var(--active-color, var(--accent1)), var(--accent2), var(--accent3));
      filter: blur(16px); z-index: -2; opacity: 0.55;
      animation: pulseGlow 2s ease-in-out infinite;
    }
    @keyframes pulseGlow { 0%,100% { opacity: 0.35; } 50% { opacity: 0.7; } }

    .search-icon {
      position: absolute; left: 18px; width: 18px; height: 18px;
      stroke: var(--muted); transition: stroke 0.3s; flex-shrink: 0; z-index: 1;
    }
    .search-box:focus-within .search-icon { stroke: var(--active-color, var(--accent1)); }

    #searchInput {
      width: 100%;
      background: #0d1117; border: 1px solid rgba(255,255,255,0.08); border-radius: 3px;
      color: var(--text); font-family: 'Space Mono', monospace; font-size: 15px;
      padding: 18px 120px 18px 54px;
      outline: none; caret-color: var(--active-color, var(--accent1));
      transition: border-color 0.3s, background 0.3s;
    }
    #searchInput::placeholder { color: var(--muted); }
    #searchInput:focus { background: #111620; border-color: transparent; }

    .go-btn {
      position: absolute; right: 8px;
      font-family: 'Space Mono', monospace; font-size: 11px;
      letter-spacing: 0.12em; text-transform: uppercase;
      background: var(--active-color, var(--accent1));
      color: #080a0f; border: none; border-radius: 2px;
      padding: 10px 16px; cursor: pointer; font-weight: 700;
      transition: background 0.25s, transform 0.15s, box-shadow 0.2s, filter 0.2s;
    }
    .go-btn:hover {
      filter: brightness(1.15); transform: translateY(-1px);
      box-shadow: 0 6px 24px color-mix(in srgb, var(--active-color, var(--accent1)) 50%, transparent);
    }
    .go-btn:active { transform: scale(0.96); }

    /* ── Mode row ── */
    .mode-row {
      display: flex; align-items: center; gap: 8px;
      margin-top: 12px; min-height: 20px;
    }
    .badge {
      font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 2px; font-weight: 700;
      opacity: 0; transform: translateY(4px);
      transition: opacity 0.2s, transform 0.2s;
    }
    .badge.visible { opacity: 1; transform: translateY(0); }
    .badge--url    { background: rgba(0,245,212,0.15); color: var(--accent1); border: 1px solid rgba(0,245,212,0.3); }
    .badge--search { background: rgba(247,37,133,0.12); color: var(--accent2); border: 1px solid rgba(247,37,133,0.3); }
    .mode-label { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; }

    /* ── Quick links ── */
    .quick-links {
      display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
      animation: fadeUp 0.9s 0.35s cubic-bezier(0.16,1,0.3,1) both;
    }
    .quick-link {
      font-family: 'Space Mono', monospace; font-size: 10px;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); text-decoration: none;
      padding: 7px 14px; border: 1px solid rgba(255,255,255,0.07); border-radius: 2px;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .quick-link:hover { color: var(--accent3); border-color: var(--accent3); background: rgba(255,214,10,0.06); }

    @keyframes fadeDown { from { opacity: 0; transform: translateY(-28px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp   { from { opacity: 0; transform: translateY(22px); }  to { opacity: 1; transform: translateY(0); } }

    .version {
      position: fixed; bottom: 42px; right: 28px;
      font-size: 9px; letter-spacing: 0.2em;
      color: rgba(255,255,255,0.1); text-transform: uppercase; z-index: 6;
    }

    /* engine switch flash */
    @keyframes engineSwitch {
      0%   { opacity: 0.6; }
      100% { opacity: 1; }
    }
    .engine-switched { animation: engineSwitch 0.25s ease both; }
  </style>
</head>
<body>
  <div class="mesh"></div>
  <div class="scanlines"></div>
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <div class="container">

    <div class="logo-wrap">
      <div class="logo" aria-label="Browsr">
        <span class="letter-b">B</span><span class="letter-r">r</span><span class="letter-o">o</span><span class="letter-w">w</span><span class="letter-s">s</span><span class="letter-r2">r</span>
      </div>
      <p class="tagline">your web · <span>everywhere</span></p>
    </div>

    <!-- Engine picker -->
    <div class="engine-picker" id="enginePicker"></div>

    <!-- Search -->
    <div class="search-wrap">
      <div class="search-box" id="searchBox">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="searchInput" type="text" placeholder="Search or enter a URL…" autocomplete="off" spellcheck="false" />
        <button class="go-btn" id="goBtn">Go →</button>
      </div>
      <div class="mode-row">
        <span class="badge" id="modeBadge"></span>
        <span class="mode-label" id="modeLabel"></span>
      </div>
    </div>

    <div class="quick-links">
      <a class="quick-link" href="https://github.com">GitHub</a>
      <a class="quick-link" href="https://youtube.com">YouTube</a>
      <a class="quick-link" href="https://reddit.com">Reddit</a>
      <a class="quick-link" href="https://wikipedia.org">Wikipedia</a>
      <a class="quick-link" href="https://news.ycombinator.com">HN</a>
    </div>

  </div>

  <div class="ticker-wrap">
    <div class="ticker-track">
      <span class="ticker-item">Browsr — Your shortcut to the web</span>
      <span class="ticker-item">10 search engines · one shortcut</span>
      <span class="ticker-item">Press Enter to go</span>
      <span class="ticker-item">Fast. Minimal. Yours.</span>
      <span class="ticker-item">Browsr — Your shortcut to the web</span>
      <span class="ticker-item">10 search engines · one shortcut</span>
      <span class="ticker-item">Press Enter to go</span>
      <span class="ticker-item">Fast. Minimal. Yours.</span>
    </div>
  </div>

  <div class="version">Browsr v2.0</div>

  <script>
    // ── Engine definitions ──────────────────────────────────────────
    const ENGINES = [
      { id: 'google',     name: 'Google',     color: '#4285f4', url: q => `https://www.google.com/search?q=${q}` },
      { id: 'bing',       name: 'Bing',       color: '#00897b', url: q => `https://www.bing.com/search?q=${q}` },
      { id: 'duckduckgo', name: 'DDG',        color: '#de5833', url: q => `https://duckduckgo.com/?q=${q}` },
      { id: 'brave',      name: 'Brave',      color: '#ff6a00', url: q => `https://search.brave.com/search?q=${q}` },
      { id: 'ecosia',     name: 'Ecosia',     color: '#4caf50', url: q => `https://www.ecosia.org/search?q=${q}` },
      { id: 'yahoo',      name: 'Yahoo',      color: '#6001d2', url: q => `https://search.yahoo.com/search?p=${q}` },
      { id: 'startpage',  name: 'Startpage',  color: '#007aff', url: q => `https://www.startpage.com/search?query=${q}` },
      { id: 'kagi',       name: 'Kagi',       color: '#ff3d82', url: q => `https://kagi.com/search?q=${q}` },
      { id: 'perplexity', name: 'Perplexity', color: '#20b2aa', url: q => `https://www.perplexity.ai/search?q=${q}` },
      { id: 'yandex',     name: 'Yandex',     color: '#fc3f1d', url: q => `https://yandex.com/search/?text=${q}` },
    ];

    const LS_KEY = 'browsr_engine';
    let activeId = localStorage.getItem(LS_KEY) || 'google';

    // ── Build engine buttons ────────────────────────────────────────
    const picker = document.getElementById('enginePicker');
    ENGINES.forEach(eng => {
      const btn = document.createElement('button');
      btn.className = 'engine-btn' + (eng.id === activeId ? ' active' : '');
      btn.dataset.id = eng.id;
      btn.style.setProperty('--engine-color', eng.color);
      btn.innerHTML = `<span class="engine-dot"></span>${eng.name}`;
      btn.addEventListener('click', () => setEngine(eng.id));
      picker.appendChild(btn);
    });

    function setEngine(id) {
      activeId = id;
      localStorage.setItem(LS_KEY, id);
      document.querySelectorAll('.engine-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.id === id);
      });
      const eng = ENGINES.find(e => e.id === id);
      // Pulse the search area colour
      document.documentElement.style.setProperty('--active-color', eng.color);
      updateMode();
      // Flash input
      const inp = document.getElementById('searchInput');
      inp.classList.remove('engine-switched');
      void inp.offsetWidth;
      inp.classList.add('engine-switched');
      inp.focus();
    }

    // Set initial active colour
    const initEng = ENGINES.find(e => e.id === activeId) || ENGINES[0];
    document.documentElement.style.setProperty('--active-color', initEng.color);

    // ── URL detection ───────────────────────────────────────────────
    function looksLikeURL(str) {
      str = str.trim();
      if (!str) return false;
      if (/^[a-zA-Z][a-zA-Z0-9+\-.]*:\/\//.test(str)) return true;
      if (/^([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,6}(\/[^\s]*)?(\?[^\s]*)?$/.test(str)) return true;
      if (/^localhost(:\d+)?(\/.*)?$/.test(str)) return true;
      if (/^(\d{1,3}\.){3}\d{1,3}(:\d+)?(\/.*)?$/.test(str)) return true;
      return false;
    }

    function normalise(str) {
      str = str.trim();
      if (/^[a-zA-Z][a-zA-Z0-9+\-.]*:\/\//.test(str)) return str;
      return 'https://' + str;
    }

    // ── Navigation ──────────────────────────────────────────────────
    function navigate() {
      const val = input.value.trim();
      if (!val) return;
      let dest;
      if (looksLikeURL(val)) {
        dest = normalise(val);
      } else {
        const eng = ENGINES.find(e => e.id === activeId) || ENGINES[0];
        dest = eng.url(encodeURIComponent(val));
      }
      window.location.href = dest;
    }

    // ── Mode badge ──────────────────────────────────────────────────
    const input  = document.getElementById('searchInput');
    const goBtn  = document.getElementById('goBtn');
    const badge  = document.getElementById('modeBadge');
    const lbl    = document.getElementById('modeLabel');

    function updateMode() {
      const val = input.value.trim();
      const eng = ENGINES.find(e => e.id === activeId) || ENGINES[0];
      if (!val) { badge.className = 'badge'; lbl.textContent = ''; return; }
      if (looksLikeURL(val)) {
        badge.className = 'badge badge--url visible';
        badge.textContent = 'URL';
        lbl.textContent = '→ ' + normalise(val);
      } else {
        badge.className = 'badge badge--search visible';
        badge.textContent = 'Search';
        lbl.textContent = `→ ${eng.name}`;
      }
    }

    input.addEventListener('input', updateMode);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(); });
    goBtn.addEventListener('click', navigate);

    // Keyboard shortcut: digits 1–9, 0 to pick engine
    document.addEventListener('keydown', e => {
      if (document.activeElement === input) return;
      if (e.key >= '1' && e.key <= '9') setEngine(ENGINES[parseInt(e.key) - 1]?.id || activeId);
      if (e.key === '0') setEngine(ENGINES[9]?.id || activeId);
    });

    input.focus();
  </script>
</body>
</html>
