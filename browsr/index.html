<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browsr</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080a0f;
      --surface: #0d1117;
      --accent1: #00f5d4;
      --accent2: #f72585;
      --accent3: #ffd60a;
      --text: #e8eaf0;
      --muted: #4a5568;
      --glow1: rgba(0, 245, 212, 0.35);
      --glow2: rgba(247, 37, 133, 0.35);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      overflow: hidden;
    }

    /* ── Noise grain overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      pointer-events: none;
    }

    /* ── Animated gradient mesh ── */
    .mesh {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(0,245,212,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 70%, rgba(247,37,133,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 55% 10%, rgba(255,214,10,0.07) 0%, transparent 60%);
      animation: meshShift 14s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes meshShift {
      0%   { filter: hue-rotate(0deg) brightness(1); }
      50%  { filter: hue-rotate(25deg) brightness(1.08); }
      100% { filter: hue-rotate(-15deg) brightness(0.95); }
    }

    /* ── Scanlines ── */
    .scanlines {
      position: fixed; inset: 0; z-index: 1;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.08) 3px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
    }

    /* ── Corner decorations ── */
    .corner {
      position: fixed;
      width: 60px; height: 60px;
      z-index: 2;
      pointer-events: none;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--accent1);
    }
    .corner::before { width: 100%; height: 2px; }
    .corner::after  { width: 2px; height: 100%; }
    .corner--tl { top: 20px; left: 20px; }
    .corner--tr { top: 20px; right: 20px; transform: scaleX(-1); }
    .corner--bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
    .corner--br { bottom: 20px; right: 20px; transform: scale(-1); }

    /* ── Ticker strip ── */
    .ticker-wrap {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 10;
      height: 32px;
      border-top: 1px solid rgba(0,245,212,0.2);
      background: rgba(0,245,212,0.04);
      overflow: hidden;
      display: flex; align-items: center;
    }
    .ticker-track {
      display: flex;
      gap: 80px;
      white-space: nowrap;
      animation: ticker 30s linear infinite;
    }
    .ticker-item {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--accent1);
      opacity: 0.5;
      text-transform: uppercase;
    }
    @keyframes ticker {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ── Main layout ── */
    .container {
      position: relative; z-index: 5;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 48px;
      padding-bottom: 48px;
    }

    /* ── Logo ── */
    .logo-wrap {
      text-align: center;
      animation: fadeDown 0.9s cubic-bezier(0.16,1,0.3,1) both;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(90px, 18vw, 200px);
      line-height: 0.88;
      letter-spacing: -0.01em;
      color: transparent;
      -webkit-text-stroke: 2px var(--text);
      position: relative;
      display: inline-block;
    }
    .logo .letter-b  { color: var(--text); -webkit-text-stroke: 0; }
    .logo .letter-r  { color: var(--accent1); -webkit-text-stroke: 0; text-shadow: 0 0 40px var(--glow1); }
    .logo .letter-o  { color: transparent; -webkit-text-stroke: 2px var(--accent2); }
    .logo .letter-w  { color: var(--accent3); -webkit-text-stroke: 0; text-shadow: 0 0 30px rgba(255,214,10,0.5); }
    .logo .letter-s  { color: transparent; -webkit-text-stroke: 2px var(--text); }
    .logo .letter-r2 { color: var(--accent2); -webkit-text-stroke: 0; text-shadow: 0 0 40px var(--glow2); }

    .tagline {
      font-size: 10px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 10px;
    }
    .tagline span { color: var(--accent1); }

    /* ── Search bar ── */
    .search-wrap {
      width: min(680px, 90vw);
      animation: fadeUp 0.9s 0.15s cubic-bezier(0.16,1,0.3,1) both;
    }

    .search-box {
      position: relative;
      display: flex; align-items: center;
    }

    /* glowing border ring */
    .search-box::before {
      content: '';
      position: absolute; inset: -2px;
      border-radius: 4px;
      background: linear-gradient(130deg, var(--accent1), var(--accent2), var(--accent3));
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .search-box:focus-within::before { opacity: 1; }
    .search-box:focus-within::after {
      content: '';
      position: absolute; inset: -2px;
      border-radius: 4px;
      background: linear-gradient(130deg, var(--accent1), var(--accent2), var(--accent3));
      filter: blur(16px);
      z-index: -2;
      opacity: 0.6;
      animation: pulseGlow 2s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 0.8; }
    }

    .search-icon {
      position: absolute; left: 18px;
      width: 18px; height: 18px;
      stroke: var(--muted);
      transition: stroke 0.3s;
      flex-shrink: 0;
    }
    .search-box:focus-within .search-icon { stroke: var(--accent1); }

    #searchInput {
      width: 100%;
      background: #0d1117;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 3px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 15px;
      padding: 18px 130px 18px 54px;
      outline: none;
      caret-color: var(--accent1);
      transition: border-color 0.3s, background 0.3s;
    }
    #searchInput::placeholder { color: var(--muted); }
    #searchInput:focus { background: #111620; border-color: transparent; }

    .go-btn {
      position: absolute; right: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: var(--accent1);
      color: #080a0f;
      border: none; border-radius: 2px;
      padding: 10px 18px;
      cursor: pointer;
      font-weight: 700;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .go-btn:hover {
      background: #00ffdf;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(0,245,212,0.4);
    }
    .go-btn:active { transform: scale(0.96); }

    /* ── Mode badge ── */
    .mode-row {
      display: flex; align-items: center; gap: 8px;
      margin-top: 14px;
      min-height: 22px;
    }
    .badge {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
      font-weight: 700;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.2s, transform 0.2s;
    }
    .badge.visible { opacity: 1; transform: translateY(0); }
    .badge--url    { background: rgba(0,245,212,0.15); color: var(--accent1); border: 1px solid rgba(0,245,212,0.3); }
    .badge--search { background: rgba(247,37,133,0.12); color: var(--accent2); border: 1px solid rgba(247,37,133,0.3); }
    .mode-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    /* ── Quick links ── */
    .quick-links {
      display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
      animation: fadeUp 0.9s 0.3s cubic-bezier(0.16,1,0.3,1) both;
    }
    .quick-link {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      padding: 7px 14px;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 2px;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .quick-link:hover {
      color: var(--accent3);
      border-color: var(--accent3);
      background: rgba(255,214,10,0.06);
    }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Version stamp ── */
    .version {
      position: fixed; bottom: 42px; right: 28px;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.1);
      text-transform: uppercase;
      z-index: 6;
    }
  </style>
</head>
<body>

  <div class="mesh"></div>
  <div class="scanlines"></div>

  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <div class="container">

    <div class="logo-wrap">
      <div class="logo" aria-label="Browsr">
        <span class="letter-b">B</span><span class="letter-r">r</span><span class="letter-o">o</span><span class="letter-w">w</span><span class="letter-s">s</span><span class="letter-r2">r</span>
      </div>
      <p class="tagline">your web · <span>everywhere</span></p>
    </div>

    <div class="search-wrap">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          id="searchInput"
          type="text"
          placeholder="Search or enter a URL…"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="go-btn" id="goBtn">Go →</button>
      </div>
      <div class="mode-row">
        <span class="badge" id="modeBadge"></span>
        <span class="mode-label" id="modeLabel"></span>
      </div>
    </div>

    <div class="quick-links">
      <a class="quick-link" href="https://github.com">GitHub</a>
      <a class="quick-link" href="https://youtube.com">YouTube</a>
      <a class="quick-link" href="https://reddit.com">Reddit</a>
      <a class="quick-link" href="https://wikipedia.org">Wikipedia</a>
      <a class="quick-link" href="https://news.ycombinator.com">HN</a>
    </div>

  </div>

  <!-- Ticker -->
  <div class="ticker-wrap">
    <div class="ticker-track">
      <span class="ticker-item">Browsr — Your shortcut to the web</span>
      <span class="ticker-item">Type a URL or search query</span>
      <span class="ticker-item">Press Enter to go</span>
      <span class="ticker-item">Fast. Minimal. Yours.</span>
      <span class="ticker-item">Browsr — Your shortcut to the web</span>
      <span class="ticker-item">Type a URL or search query</span>
      <span class="ticker-item">Press Enter to go</span>
      <span class="ticker-item">Fast. Minimal. Yours.</span>
    </div>
  </div>

  <div class="version">Browsr v1.0</div>

  <script>
    const input    = document.getElementById('searchInput');
    const goBtn    = document.getElementById('goBtn');
    const badge    = document.getElementById('modeBadge');
    const lbl      = document.getElementById('modeLabel');

    function looksLikeURL(str) {
      str = str.trim();
      if (!str) return false;

      // Already has a scheme
      if (/^[a-zA-Z][a-zA-Z0-9+\-.]*:\/\//.test(str)) return true;

      // Bare hostname patterns: something.tld or something.tld/path
      // Must have at least one dot and a recognised-ish TLD (2–6 chars)
      const bareHost = /^([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,6}(\/[^\s]*)?(\?[^\s]*)?$/.test(str);
      // Reject if it looks like a plain word with a dot extension that's clearly not a TLD phrase
      // (e.g. "hello.world!" has a trailing !, handled by the regex above)
      if (bareHost) return true;

      // localhost[:port]
      if (/^localhost(:\d+)?(\/.*)?$/.test(str)) return true;

      // IP address
      if (/^(\d{1,3}\.){3}\d{1,3}(:\d+)?(\/.*)?$/.test(str)) return true;

      return false;
    }

    function normalise(str) {
      str = str.trim();
      if (/^[a-zA-Z][a-zA-Z0-9+\-.]*:\/\//.test(str)) return str;
      return 'https://' + str;
    }

    function navigate() {
      const val = input.value.trim();
      if (!val) return;
      const dest = looksLikeURL(val)
        ? normalise(val)
        : 'https://www.google.com/search?q=' + encodeURIComponent(val);
      window.location.href = dest;
    }

    function updateMode() {
      const val = input.value.trim();
      if (!val) {
        badge.className = 'badge';
        lbl.textContent = '';
        return;
      }
      if (looksLikeURL(val)) {
        badge.className = 'badge badge--url visible';
        badge.textContent = 'URL';
        lbl.textContent = '→ ' + normalise(val);
      } else {
        badge.className = 'badge badge--search visible';
        badge.textContent = 'Search';
        lbl.textContent = '→ Google';
      }
    }

    input.addEventListener('input', updateMode);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(); });
    goBtn.addEventListener('click', navigate);

    // Auto-focus
    input.focus();
  </script>
</body>
</html>
